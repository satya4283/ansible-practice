- name: Ansible data types 
  hosts: local
  connection: local
  vars:
    COURSE: Devops with AWS # string
    DURATION: 10 # NUMBER
    IS_LIVE: true
    TOOLS:
    - ansible
    - terraform
    - shell script
    - linux
    CONCEPTS:
      CI: "jenkins"
      SCRIPTING: "shell, ansible, terraform, python"

  tasks:
  - name: print course information
    ansible.builtin.debug:
      msg: "Hello I am learning {{ COURSE }}, duration: {{ DURATION }}, is live: {{ IS_LIVE }} and list of tools:{{ TOOLS }} and concepts:{{ CONCEPTS }"