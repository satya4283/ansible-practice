- name: Functions 
  hosts: local
  connection: local
  vars:
    persons: "Satya,Bhargavi,Devi,Manikanta"
  tasks:
  - name: check undefined variables
    ansible.builtin.debug:
      msg: "Hello {{ person | default('satya')}}"

  - name: print names
    ansible.builtin.debug:
      msg: "{{persons | split(',')}}"

  - name: convert map into list
    vars:
      course:
        name: ansible
        duration: 10hrs 
        trainer: satya 
    ansible.builtin.debug:
      msg: "{{ course | dict2items }}"

  - name: convert list to map 
    vars:
      course:
      -  {
            "key": "name",
            "value": "ansible"
        }
      -  {
            "key": "duration",
            "value": "10hrs"
        }
      - {
            "key": "trainer",
            "value": "satya"
        }

    ansible.builtin.debug:
      msg: "{{course | items2dict }}"

  - name: convert to uppercase
    vars:
      name: satyanarayana t 
    ansible.builtin.debug:
      msg: "{{ name| upper }}"
  
  - name: convert to lowercase
    vars:
      name: SATYANARAYANA T
    ansible.builtin.debug:
      msg: "{{ name| lower }}"

  - name: check IP address is valid or not 
    vars:
      IP: 256.765.435.874
    ansible.builtin.debug:
      msg: "{{IP | ansible.utils.ipaddr }}"