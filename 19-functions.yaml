- name: Functions 
  hosts: local
  connection: local
  vars:
    persons: "Satya,Bhargavi,Devi,Manikanta"
  tasks:
  - name: check undefined variables
    ansible.builtin.debug:
      msg: "Hello {{ person | default('satya')}}"

  - name: print names
    ansible.builtin.debug:
      msg: "{{persons | split(',')}}"

  - name: convert map into list
    vars:
      course:
        name: ansible
        duration: 10hrs 
        trainer: satya 
    ansible.builtin.debug:
      msg: "{{ course | dict2items }}"
